<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administrar Roles</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <h1>Administrar Roles</h1>

  <section>
    <h2>Lista de Administradores</h2>
    <ul id="admin-list"></ul>
  </section>

  <section>
    <h2>Convertir usuario en administrador</h2>
    <input type="email" id="email-input" placeholder="Correo del usuario">
    <button id="make-admin">Hacer Administrador</button>
  </section>

  <section>
    <h2>Eliminar administrador</h2>
    <input type="email" id="remove-email" placeholder="Correo del administrador">
    <button id="remove-admin">Eliminar Administrador</button>
  </section>

  <script type="module" src="index.js"></script>
</body>
</html>
